<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamMaster Mobile - Graba y Presenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .record-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #camera-bubble {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            position: absolute;
            bottom: 120px;
            right: 20px;
            overflow: hidden;
            z-index: 50;
            touch-action: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: #000;
            cursor: grab;
            transition: border-color 0.3s ease;
        }

        #camera-bubble:active {
            cursor: grabbing;
            border-color: var(--secondary);
        }

        video#face-cam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #main-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
        }

        /* Contenedores multimedia (Ocultos a la vista, se dibujan en el canvas o se muestran bajo demanda) */
        .media-layer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0f172a;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .hidden-element {
            display: none !important;
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Active states for buttons */
        .btn-active {
            background-color: rgba(99, 102, 241, 0.3) !important;
            border: 1px solid var(--primary);
        }
        .btn-active i {
            color: #818cf8 !important;
        }

        /* Controles PDF */
        #pdf-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 40;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-50 p-4 flex justify-between items-center glass">
        <div>
            <h1 class="text-xl font-bold gradient-text">StreamMaster</h1>
            <p id="status-text" class="text-[10px] uppercase tracking-widest text-gray-400">Listo para grabar</p>
        </div>
        <div id="timer" class="text-lg font-mono font-bold hidden">00:00</div>
    </header>

    <!-- Main Viewport -->
    <main class="relative w-full h-full flex items-center justify-center bg-[#0f172a]">
        <!-- Placeholder -->
        <div id="placeholder" class="text-center p-8 z-10">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="file-plus-2" class="text-indigo-400 w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Sube tu Archivo</h2>
            <p class="text-gray-400 text-sm max-w-xs mx-auto mb-4">Sube un PDF, una imagen o un video para usarlo como presentación. Activa tu cámara y graba.</p>
            <div id="browser-warning" class="hidden text-xs text-amber-400 bg-amber-900/20 p-3 rounded border border-amber-500/30 max-w-sm mx-auto">
                <p class="font-bold mb-1"><i data-lucide="alert-triangle" class="w-4 h-4 inline mb-1"></i> Sin compartir pantalla</p>
                Usa el botón de <strong>Archivo</strong> abajo para cargar tu presentación PDF directamente.
            </div>
        </div>

        <!-- Capas Multimedia -->
        <video id="main-preview" class="z-0 hidden-element media-layer" autoplay playsinline muted></video> <!-- Para Screen Share -->
        <img id="image-preview" class="hidden-element media-layer" alt="Imagen cargada"> <!-- Para Imagen -->
        <video id="video-preview" class="hidden-element media-layer" playsinline loop muted></video> <!-- Para Video subido -->
        <canvas id="pdf-preview" class="hidden-element media-layer"></canvas> <!-- Para renderizar PDF -->
        
        <!-- Face Cam Bubble -->
        <div id="camera-bubble" class="hidden-element">
            <video id="face-cam" autoplay playsinline muted></video>
        </div>

        <!-- Controles PDF Flotantes -->
        <div id="pdf-controls" class="hidden-element flex flex-col gap-3 glass p-2 rounded-full shadow-lg">
            <button id="btn-prev-page" class="p-3 bg-indigo-600 hover:bg-indigo-500 rounded-full text-white transition-colors">
                <i data-lucide="chevron-up" class="w-6 h-6"></i>
            </button>
            <span id="pdf-page-num" class="text-white text-center text-xs font-bold py-1">1/1</span>
            <button id="btn-next-page" class="p-3 bg-indigo-600 hover:bg-indigo-500 rounded-full text-white transition-colors">
                <i data-lucide="chevron-down" class="w-6 h-6"></i>
            </button>
        </div>
    </main>

    <!-- Hidden File Input for Docs/Media -->
    <input type="file" id="file-upload" accept="image/*,video/*,application/pdf" class="hidden-element">

    <!-- Controls -->
    <footer class="fixed bottom-0 left-0 w-full z-50 p-4 glass rounded-t-3xl pb-8">
        <div class="flex justify-between items-center max-w-md mx-auto px-1 sm:px-4">
            
            <!-- Toggle Mic -->
            <button id="btn-mic" class="p-3 sm:p-4 rounded-full bg-white/10 hover:bg-white/20 transition-all flex flex-col items-center gap-1 focus:outline-none">
                <i data-lucide="mic-off" id="mic-icon" class="w-5 h-5 sm:w-6 sm:h-6 text-white"></i>
            </button>

            <!-- Toggle Screen (Native) -->
            <button id="btn-screen" class="p-3 sm:p-4 rounded-full bg-white/10 hover:bg-white/20 transition-all flex flex-col items-center gap-1 focus:outline-none">
                <i data-lucide="screen-share" class="w-5 h-5 sm:w-6 sm:h-6 text-white"></i>
            </button>

            <!-- Main Record Button -->
            <button id="btn-record" class="w-16 h-16 sm:w-20 sm:h-20 mx-1 sm:mx-2 flex-shrink-0 rounded-full bg-white flex items-center justify-center shadow-xl disabled:opacity-50 transition-all active:scale-95 focus:outline-none">
                <div id="record-icon" class="w-6 h-6 sm:w-8 sm:h-8 bg-red-600 rounded-full transition-all"></div>
            </button>

            <!-- Upload File (PDF/Image/Video) -->
            <button id="btn-file" class="p-3 sm:p-4 rounded-full bg-white/10 hover:bg-white/20 transition-all flex flex-col items-center gap-1 focus:outline-none relative">
                <i data-lucide="folder-open" class="w-5 h-5 sm:w-6 sm:h-6 text-white"></i>
                <span class="absolute -top-1 -right-1 flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                </span>
            </button>

            <!-- Toggle Camera -->
            <button id="btn-camera" class="p-3 sm:p-4 rounded-full bg-white/10 hover:bg-white/20 transition-all flex flex-col items-center gap-1 focus:outline-none">
                <i data-lucide="camera" class="w-5 h-5 sm:w-6 sm:h-6 text-white"></i>
            </button>

        </div>
    </footer>

    <!-- Off-screen Canvas for Processing -->
    <canvas id="recorder-canvas" class="hidden-element"></canvas>

    <!-- Notification / Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-full text-sm font-medium opacity-0 transition-opacity z-[100] pointer-events-none text-center max-w-[90%] shadow-lg">
        Mensaje aquí
    </div>

    <script>
        // Configurar worker de PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // DOM Elements
        const btnScreen = document.getElementById('btn-screen');
        const btnCamera = document.getElementById('btn-camera');
        const btnMic = document.getElementById('btn-mic');
        const btnRecord = document.getElementById('btn-record');
        const btnFile = document.getElementById('btn-file');
        
        const recordIcon = document.getElementById('record-icon');
        const micIcon = document.getElementById('mic-icon');
        
        const faceCam = document.getElementById('face-cam');
        const cameraBubble = document.getElementById('camera-bubble');
        
        const placeholder = document.getElementById('placeholder');
        const statusText = document.getElementById('status-text');
        const timerDisplay = document.getElementById('timer');
        const toast = document.getElementById('toast');
        const canvas = document.getElementById('recorder-canvas');
        const browserWarning = document.getElementById('browser-warning');
        const fileUpload = document.getElementById('file-upload');
        const ctx = canvas.getContext('2d');

        // Multimedia Elements
        const mainPreview = document.getElementById('main-preview'); // Screen Share
        const imagePreview = document.getElementById('image-preview'); // Imagen
        const videoPreview = document.getElementById('video-preview'); // Video subido
        const pdfPreview = document.getElementById('pdf-preview'); // Canvas de PDF
        const pdfCtx = pdfPreview.getContext('2d');
        const pdfControls = document.getElementById('pdf-controls');
        const pdfPageNum = document.getElementById('pdf-page-num');

        // State
        let screenStream = null;
        let cameraStream = null;
        let micStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let startTime = 0;
        let timerInterval = null;
        let animationFrameId = null;

        // Current Media Source Tracking
        let currentMediaElement = null; // El elemento actual que se dibujará de fondo (video, img, o pdfPreview)
        let currentMediaType = null; // 'screen', 'image', 'video', 'pdf'

        // PDF State
        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Environment Check
        window.onload = () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                browserWarning.classList.remove('hidden-element');
                btnScreen.style.display = 'none'; 
            }
        };

        // Notification Helper
        let toastTimeout;
        function showToast(msg, duration = 3000) {
            clearTimeout(toastTimeout);
            toast.innerText = msg;
            toast.style.opacity = '1';
            toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, duration);
        }

        // Timer Helper
        function updateTimer() {
            const now = Date.now();
            const diff = new Date(now - startTime);
            const mins = String(diff.getUTCMinutes()).padStart(2, '0');
            const secs = String(diff.getUTCSeconds()).padStart(2, '0');
            timerDisplay.innerText = `${mins}:${secs}`;
        }

        // --- DRAG LOGIC PARA CAMARA ---
        let isDragging = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0;
        let yOffset = 0;

        cameraBubble.addEventListener("touchstart", dragStart, {passive: false});
        cameraBubble.addEventListener("touchend", dragEnd, false);
        cameraBubble.addEventListener("touchmove", drag, {passive: false});
        cameraBubble.addEventListener("mousedown", dragStart, false);
        document.addEventListener("mouseup", dragEnd, false);
        document.addEventListener("mousemove", drag, false);

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === cameraBubble || cameraBubble.contains(e.target)) isDragging = true;
        }

        function dragEnd() { initialX = currentX; initialY = currentY; isDragging = false; }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX; yOffset = currentY;
                setTranslate(currentX, currentY, cameraBubble);
            }
        }

        function setTranslate(xPos, yPos, el) { el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`; }


        // --- MANEJO DE MULTIMEDIA Y ARCHIVOS ---
        
        function hideAllMediaLayers() {
            mainPreview.classList.add('hidden-element');
            imagePreview.classList.add('hidden-element');
            videoPreview.classList.add('hidden-element');
            pdfPreview.classList.add('hidden-element');
            pdfControls.classList.add('hidden-element');
            videoPreview.pause();
            currentMediaElement = null;
            currentMediaType = null;
        }

        btnFile.onclick = () => fileUpload.click();

        fileUpload.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const type = file.type;
            
            // Limpiar capa anterior
            if (screenStream) toggleScreen(); // Apagar pantalla si estaba compartida
            hideAllMediaLayers();
            placeholder.classList.add('hidden-element');
            btnFile.classList.add('btn-active');

            if (type.startsWith('image/')) {
                // --- MODO IMAGEN ---
                imagePreview.src = url;
                imagePreview.onload = () => {
                    imagePreview.classList.remove('hidden-element');
                    currentMediaElement = imagePreview;
                    currentMediaType = 'image';
                    showToast("Imagen lista.");
                };
            } 
            else if (type.startsWith('video/')) {
                // --- MODO VIDEO ---
                videoPreview.src = url;
                videoPreview.onloadeddata = () => {
                    videoPreview.classList.remove('hidden-element');
                    videoPreview.play();
                    currentMediaElement = videoPreview;
                    currentMediaType = 'video';
                    showToast("Video listo y reproduciéndose.");
                };
            } 
            else if (type === 'application/pdf') {
                // --- MODO PDF ---
                showToast("Procesando PDF...");
                try {
                    pdfDoc = await pdfjsLib.getDocument(url).promise;
                    pdfPreview.classList.remove('hidden-element');
                    pdfControls.classList.remove('hidden-element');
                    currentMediaElement = pdfPreview;
                    currentMediaType = 'pdf';
                    pageNum = 1;
                    renderPage(pageNum);
                    showToast("¡PDF cargado! Usa las flechas para pasar de página.");
                } catch (error) {
                    console.error("Error al cargar PDF:", error);
                    showToast("Error al leer el archivo PDF.");
                }
            } else {
                showToast("Formato no soportado. Sube PDF, Imagen o Video.");
                placeholder.classList.remove('hidden-element');
                btnFile.classList.remove('btn-active');
            }
        };

        // --- FUNCIONES PDF ---
        async function renderPage(num) {
            pageRendering = true;
            const page = await pdfDoc.getPage(num);
            
            // Resolucion de renderizado (Escala 2 para buena calidad)
            const viewport = page.getViewport({ scale: 2.0 });
            pdfPreview.height = viewport.height;
            pdfPreview.width = viewport.width;

            const renderContext = { canvasContext: pdfCtx, viewport: viewport };
            await page.render(renderContext).promise;
            
            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
            pdfPageNum.innerText = `${num}/${pdfDoc.numPages}`;
        }

        function queueRenderPage(num) {
            if (pageRendering) pageNumPending = num;
            else renderPage(num);
        }

        document.getElementById('btn-prev-page').onclick = () => {
            if (pdfDoc && pageNum > 1) { pageNum--; queueRenderPage(pageNum); }
        };

        document.getElementById('btn-next-page').onclick = () => {
            if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); }
        };


        // --- MANEJO DE CAMARA, MIC Y PANTALLA ---

        async function toggleMic() {
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop()); micStream = null;
                btnMic.classList.remove('btn-active'); micIcon.setAttribute('data-lucide', 'mic-off');
                lucide.createIcons(); showToast("Micrófono desactivado");
            } else {
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true }});
                    btnMic.classList.add('btn-active'); micIcon.setAttribute('data-lucide', 'mic');
                    lucide.createIcons(); showToast("Micrófono activo.");
                } catch (err) { showToast("Error de micrófono."); }
            }
        }

        async function toggleCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; faceCam.srcObject = null;
                cameraBubble.classList.add('hidden-element'); btnCamera.classList.remove('btn-active'); showToast("Cámara desactivada");
            } else {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 720 } }, audio: false });
                    faceCam.srcObject = cameraStream; cameraBubble.classList.remove('hidden-element');
                    btnCamera.classList.add('btn-active'); showToast("Cámara frontal activa");
                } catch (err) { showToast("Error de cámara."); }
            }
        }

        async function toggleScreen() {
            if (!navigator.mediaDevices.getDisplayMedia) return;

            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop()); screenStream = null; mainPreview.srcObject = null;
                hideAllMediaLayers(); btnScreen.classList.remove('btn-active');
                if(!isRecording) placeholder.classList.remove('hidden-element');
                showToast("Pantalla desconectada");
            } else {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: "monitor" }, audio: false });
                    hideAllMediaLayers(); // Apagar otras capas (PDF/IMG)
                    btnFile.classList.remove('btn-active');
                    
                    mainPreview.srcObject = screenStream;
                    mainPreview.classList.remove('hidden-element');
                    placeholder.classList.add('hidden-element');
                    btnScreen.classList.add('btn-active');
                    
                    currentMediaElement = mainPreview;
                    currentMediaType = 'screen';
                    showToast("Pantalla lista.", 3000);
                    
                    screenStream.getVideoTracks()[0].onended = () => { if(screenStream) toggleScreen(); };
                } catch (err) {
                    showToast("Usa el botón de Archivo para cargar tu presentación PDF.");
                }
            }
        }

        // --- MOTOR DE RENDERIZADO (El cerebro del Canvas) ---
        function drawFrame() {
            if (!isRecording) return;

            // Determinar dimensiones del lienzo base (1280x720 por defecto)
            const width = 1280;
            const height = 720;
            
            if (canvas.width !== width) { canvas.width = width; canvas.height = height; }

            // 1. Dibujar Fondo Negro
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. Dibujar Elemento Multimedia (Pantalla, Imagen, Video, PDF)
            if (currentMediaElement && (currentMediaType !== 'screen' || mainPreview.readyState === 4)) {
                
                let sourceWidth, sourceHeight;
                
                if (currentMediaType === 'image') { sourceWidth = currentMediaElement.naturalWidth; sourceHeight = currentMediaElement.naturalHeight; }
                else if (currentMediaType === 'pdf') { sourceWidth = currentMediaElement.width; sourceHeight = currentMediaElement.height; }
                else { sourceWidth = currentMediaElement.videoWidth; sourceHeight = currentMediaElement.videoHeight; }

                if (sourceWidth && sourceHeight) {
                    // Mantener Aspect Ratio (Letterboxing)
                    const canvasRatio = canvas.width / canvas.height;
                    const mediaRatio = sourceWidth / sourceHeight;
                    let drawWidth = canvas.width; let drawHeight = canvas.height;
                    let offsetX = 0; let offsetY = 0;

                    if (mediaRatio > canvasRatio) {
                        drawHeight = canvas.width / mediaRatio;
                        offsetY = (canvas.height - drawHeight) / 2;
                    } else {
                        drawWidth = canvas.height * mediaRatio;
                        offsetX = (canvas.width - drawWidth) / 2;
                    }
                    ctx.drawImage(currentMediaElement, offsetX, offsetY, drawWidth, drawHeight);
                }
            } else if (!currentMediaElement) {
                // Modo "Solo Cámara"
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)"; ctx.font = "bold 40px Inter"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("MODO CÁMARA", canvas.width / 2, canvas.height / 2);
            }

            // 3. Dibujar Burbuja de Cámara
            if (cameraStream && faceCam.readyState === 4) {
                const isOnlyCamera = !currentMediaElement;
                const bubbleSize = isOnlyCamera ? Math.min(canvas.width, canvas.height) * 0.6 : Math.max(150, canvas.width * 0.20); 
                const padding = isOnlyCamera ? 0 : 30;
                
                const x = isOnlyCamera ? (canvas.width - bubbleSize) / 2 : canvas.width - bubbleSize - padding;
                const y = isOnlyCamera ? (canvas.height - bubbleSize) / 2 : canvas.height - bubbleSize - padding;

                ctx.save();
                ctx.beginPath();
                ctx.arc(x + bubbleSize/2, y + bubbleSize/2, bubbleSize/2, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                
                // Espejo
                ctx.translate(x + bubbleSize, y);
                ctx.scale(-1, 1);
                ctx.drawImage(faceCam, 0, 0, bubbleSize, bubbleSize);
                ctx.restore();
                
                ctx.strokeStyle = "#6366f1"; ctx.lineWidth = Math.max(3, canvas.width * 0.005); ctx.stroke();
            }

            // CORRECCIÓN: Usar setTimeout en lugar de requestAnimationFrame para asegurar fotogramas
            // incluso si el usuario minimiza el navegador (Mobile-Friendly)
            animationFrameId = setTimeout(drawFrame, 33); // Aprox 30 FPS constantes
        }

        // --- SISTEMA DE GRABACIÓN ---
        async function startRecording() {
            if (!currentMediaElement && !cameraStream) {
                showToast("Activa cámara o sube un archivo primero."); return;
            }
            if (!micStream) { showToast("Activando micrófono..."); await toggleMic(); }

            placeholder.classList.add('hidden-element');
            recordedChunks = []; isRecording = true;

            const stream = canvas.captureStream(30);
            if (micStream && micStream.getAudioTracks().length > 0) stream.addTrack(micStream.getAudioTracks()[0]);

            // Configurar MediaRecorder de manera más segura y compatible (Especial para móviles)
            const types = ['video/mp4', 'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
            let options = {};
            let selectedMimeType = 'video/webm'; // Fallback por defecto
            
            for (let t of types) {
                if (MediaRecorder.isTypeSupported(t)) { 
                    options = { mimeType: t, videoBitsPerSecond: 2500000 }; 
                    selectedMimeType = t;
                    break; 
                }
            }

            try { mediaRecorder = new MediaRecorder(stream, options); } 
            catch (e) { showToast("Navegador no soporta grabar video en este formato."); isRecording = false; return; }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                // Forzar el MimeType correcto basado en la selección al generar el blob
                const finalMimeType = mediaRecorder.mimeType || selectedMimeType;
                const ext = finalMimeType.includes('mp4') ? 'mp4' : 'webm';
                
                const blob = new Blob(recordedChunks, { type: finalMimeType });
                const a = document.createElement('a');
                a.style.display = 'none'; 
                a.href = URL.createObjectURL(blob); 
                a.download = `StreamMaster-${Date.now()}.${ext}`;
                document.body.appendChild(a); 
                a.click(); 
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(a.href); }, 100);
                showToast("¡Grabación guardada correctamente!");
            };

            // CORRECCIÓN: Guardar partes del video cada 1000ms (1 segundo) 
            // Esto previene que el video se corrompa entero si hay una pequeña interrupción
            mediaRecorder.start(1000); 
            
            startTime = Date.now(); timerInterval = setInterval(updateTimer, 1000);
            timerDisplay.classList.remove('hidden'); btnRecord.classList.add('record-pulse');
            recordIcon.classList.replace('rounded-full', 'rounded-sm');
            statusText.innerText = "Grabando en vivo..."; statusText.classList.add('text-red-500');

            drawFrame();
        }

        function stopRecording() {
            isRecording = false;
            if (animationFrameId) { clearTimeout(animationFrameId); animationFrameId = null; } // CORRECCIÓN: timeout instead of animation frame
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            
            clearInterval(timerInterval); timerDisplay.classList.add('hidden');
            btnRecord.classList.remove('record-pulse'); recordIcon.classList.replace('rounded-sm', 'rounded-full');
            statusText.innerText = "Listo para grabar"; statusText.classList.remove('text-red-500');
            
            if (!currentMediaElement) placeholder.classList.remove('hidden-element');
        }

        // Event Listeners restaurados
        btnMic.onclick = toggleMic;
        btnCamera.onclick = toggleCamera;
        btnScreen.onclick = toggleScreen;
        btnRecord.onclick = () => { isRecording ? stopRecording() : startRecording(); };

    </script>
</body>
</html>
